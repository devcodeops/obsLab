name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type (only applies on main)'
        required: true
        default: minor
        type: choice
        options:
          - minor
          - major

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Compute version ──────────────────────────────────────────────
      - name: Compute release version
        id: version
        run: |
          RAW=$(node -p "require('./package.json').version")
          BRANCH="${GITHUB_REF_NAME}"

          if [[ "$BRANCH" == "main" ]]; then
            # Strip -SNAPSHOT suffix to get the base version
            BASE="${RAW%-SNAPSHOT}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

            if [[ "${{ inputs.version_type }}" == "major" ]]; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            fi
            # minor: use BASE as-is (SNAPSHOT already targets this version)

            RELEASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            RELEASE_BRANCH="release/${MAJOR}.${MINOR}"

            # Next development version for main: bump minor, add SNAPSHOT
            NEXT_DEV="${MAJOR}.$((MINOR + 1)).0-SNAPSHOT"

            echo "create_branch=true" >> "$GITHUB_OUTPUT"
            echo "release_branch=${RELEASE_BRANCH}" >> "$GITHUB_OUTPUT"
            echo "next_dev=${NEXT_DEV}" >> "$GITHUB_OUTPUT"

          elif [[ "$BRANCH" == release/* ]]; then
            # Release branches have stable versions (no SNAPSHOT)
            IFS='.' read -r MAJOR MINOR PATCH <<< "$RAW"
            PATCH=$((PATCH + 1))
            RELEASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"

            echo "create_branch=false" >> "$GITHUB_OUTPUT"

          else
            echo "::error::This workflow must be run from main or a release/* branch"
            exit 1
          fi

          TAG="v${RELEASE_VERSION}"

          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          echo "### Release: ${RELEASE_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source branch: ${BRANCH}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: ${TAG}" >> "$GITHUB_STEP_SUMMARY"

      # ── Release from main ────────────────────────────────────────────
      - name: Create release branch from main
        if: steps.version.outputs.create_branch == 'true'
        run: |
          # Set the release version in package.json and commit
          npm pkg set version="${{ steps.version.outputs.version }}"
          git add package.json
          git commit -m "chore: release ${{ steps.version.outputs.version }}"

          # Create release branch pointing at this commit
          git checkout -b ${{ steps.version.outputs.release_branch }}
          git push origin ${{ steps.version.outputs.release_branch }}

          # Tag the release commit on the release branch
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

          # Return to main and set next development SNAPSHOT version
          git checkout main
          npm pkg set version="${{ steps.version.outputs.next_dev }}"
          git add package.json
          git commit -m "chore: begin ${{ steps.version.outputs.next_dev }} development"
          git push origin main

      # ── Release from release/* ───────────────────────────────────────
      - name: Bump patch on release branch
        if: steps.version.outputs.create_branch == 'false'
        run: |
          # Update version and commit
          npm pkg set version="${{ steps.version.outputs.version }}"
          git add package.json
          git commit -m "chore: release ${{ steps.version.outputs.version }}"
          git push origin ${{ steps.version.outputs.branch }}

          # Tag the release commit
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      # ── GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      # ── Docker images (multi-arch) ───────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image prefix
        id: image
        run: |
          echo "prefix=${REGISTRY}/${{ github.repository_owner }}/obslab" >> "$GITHUB_OUTPUT"

      - name: Build and push orchestrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/orchestrator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}-orchestrator:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.prefix }}-orchestrator:latest

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}-worker:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.prefix }}-worker:latest

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}-web:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.prefix }}-web:latest
